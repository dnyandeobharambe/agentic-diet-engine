name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Syntax: https://USERNAME:TOKEN@huggingface.co/spaces/ORG/SPACE
          git push --force https://dnyandeobharambe:$HF_TOKEN@huggingface.co/spaces/aiassembled/aiassembled main
          